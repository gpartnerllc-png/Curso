<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Curso de Agente de Portaria (AGP)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos de impressão para forçar o formato A4 */
        @media print {
            body {
                background: white;
                color: black;
                font-family: Arial, sans-serif;
            }
            .no-print {
                display: none !important;
            }
            .print-container {
                width: 210mm;
                height: 297mm;
                padding: 20mm;
                margin: 0;
                box-shadow: none;
                border: none;
            }
            input[type="text"], input[type="date"], input[type="email"], select, textarea {
                border: none !important;
                border-bottom: 1px solid #000 !important;
                background: transparent !important;
                padding: 0 !important;
                margin-bottom: 4px;
            }
            input[type="checkbox"] {
                border: 1px solid #000 !important;
            }
        }
        /* Estilo da caixa da foto 3x4 */
        .photo-box {
            border: 2px dashed #cbd5e1;
            width: 3cm;
            height: 4cm;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
        }
        @media print {
            .photo-box {
                border: 1px solid #000;
            }
        }
    </style>
</head>
<body class="bg-gray-100 py-10 px-4">

    <div class="print-container max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md border border-gray-200">
        
        <div class="text-center border-b-2 border-gray-800 pb-4 mb-6">
            <h1 class="text-2xl font-bold text-gray-800 uppercase">Instituto Davi Godoi</h1>
            <p class="text-lg font-semibold text-gray-600 mt-1">Ficha de Inscrição – Curso de Agente de Portaria (AGP)</p>
        </div>

        <form id="registrationForm" onsubmit="imprimirFicha(event)">
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div class="md:col-span-3 space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700">Nº Inscrição:</label>
                        <input type="text" class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700">Nome Completo:</label>
                        <input type="text" required class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                    </div>
                </div>
                <div class="flex justify-center md:justify-end items-start">
                    <div class="photo-box">
                        <span>Foto 3x4</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Data de Nascimento:</label>
                    <input type="date" required class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">CPF:</label>
                    <input type="text" placeholder="000.000.000-00" required class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">RG:</label>
                    <input type="text" required class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Telefone / WhatsApp:</label>
                    <input type="text" placeholder="(61) 99999-9999" required class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">E-mail:</label>
                    <input type="email" required class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="md:col-span-1">
                    <label class="block text-sm font-bold text-gray-700">Endereço:</label>
                    <input type="text" required class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Bairro:</label>
                    <input type="text" required class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Cidade:</label>
                    <input type="text" required class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                </div>
            </div>

            <div class="mb-6">
                <span class="block text-sm font-bold text-gray-700 mb-2">ESCOLARIDADE:</span>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <label class="inline-flex items-center space-x-2">
                        <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Ensino Fundamental</span>
                    </label>
                    <label class="inline-flex items-center space-x-2">
                        <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Ensino Médio Incomp.</span>
                    </label>
                    <label class="inline-flex items-center space-x-2">
                        <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Ensino Médio Compl.</span>
                    </label>
                    <label class="inline-flex items-center space-x-2">
                        <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Ensino Superior</span>
                    </label>
                </div>
            </div>

            <div class="mb-6">
                <span class="block text-sm font-bold text-gray-700 mb-2">EXPERIÊNCIA NA ÁREA:</span>
                <div class="flex space-x-6 mb-2">
                    <label class="inline-flex items-center space-x-2">
                        <input type="checkbox" id="exp-sim" class="rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Sim</span>
                    </label>
                    <label class="inline-flex items-center space-x-2">
                        <input type="checkbox" id="exp-nao" class="rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-sm">Não</span>
                    </label>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Qual?</label>
                    <input type="text" class="w-full border-b border-gray-400 focus:border-blue-500 outline-none py-1">
                </div>
            </div>

            <div class="border-t border-gray-300 pt-4 mb-8">
                <h3 class="text-sm font-bold text-gray-800 mb-2">DECLARAÇÃO</h3>
                <p class="text-sm text-gray-600 italic">Declaro que as informações prestadas são verdadeiras e estou ciente das normas do curso.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6 pt-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Data:</label>
                    <input type="text" placeholder="____/____/______" class="w-full border-b border-gray-400 outline-none py-1">
                </div>
                <div class="flex flex-col justify-end">
                    <div class="border-b border-gray-400 w-full mb-1"></div>
                    <label class="block text-xs font-bold text-gray-500 text-center">Assinatura do(a) Aluno(a)</label>
                </div>
            </div>

            <div class="text-center text-xs text-gray-500 border-t border-gray-200 pt-4 mt-8">
                Informações: (61) 99160-4538 - WhatsApp (Vanessa)
            </div>

            <div class="no-print mt-8 flex justify-center">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded shadow transition duration-200">
                    Gerar Ficha e Imprimir
                </button>
            </div>
        </form>
    </div>

    <script>
        function imprimirFicha(event) {
            event.preventDefault(); // Impede o recarregamento da página
            window.print(); // Abre o diálogo de impressão nativo do sistema
        }
    </script>
</body>
</html>
